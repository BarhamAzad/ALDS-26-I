# Zombie Laser Targeting System Configuration

# YOLO26 Detection Settings
detection:
  model: runs/detect/runs/detect/yolo26s_human_zombie_finetune_afterlife/weights/best.pt
  confidence_threshold: 0.5
  iou_threshold: 0.45
  classes:  # Classes to detect
    - human
    - zombie

# Depth Estimation Settings
depth:
  enabled: true
  model: depth_anything_v2
  encoder: vits  # vits, vitb, vitl
  device: auto  # auto, cuda, or cpu
  input_size: 256
  update_interval: 8  # Estimate depth every N frames for faster live preview

# Laser Control Settings
laser:
  enabled: false
  auto_fire: false      # Keep false for servo aiming/calibration; true sends FIRE:ON
  port: /dev/ttyUSB0  # Serial port for laser control
  baud_rate: 9600
  target_class: zombie  # Only target zombies, exclude humans
  fallback_to_any_detection: false
  min_distance: 0.05    # Minimum relative depth value (0..1)
  max_distance: 0.95    # Maximum relative depth value (0..1)
  pan_start: 90
  tilt_start: 90
  pan_min: 0
  pan_max: 180
  tilt_min: 0
  tilt_max: 180
  pan_gain: 6.0         # Degrees to correct when target is at frame edge
  tilt_gain: 6.0        # Degrees to correct when target is at frame edge
  deadband_px: 20       # Do not move when target is close enough to center
  command_interval: 0.05
  invert_pan: false     # Flip if the pan axis moves away from the target
  invert_tilt: false    # Flip if the tilt axis moves away from the target

# Video Input Settings
video:
  source: 0  # 0 for webcam, or path to video file
  fps: 30
  width: 640
  height: 480
  flip_horizontal: false

# Output Settings
output:
  save_results: true
  results_dir: results/
  save_video: false
  draw_bbox: true
  draw_depth: true
