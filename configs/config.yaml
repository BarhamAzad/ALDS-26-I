# Zombie Laser Targeting System Configuration

# YOLO26 Detection Settings
detection:
  model: runs/detect/runs/detect/yolo26s_human_zombie_finetune/weights/best.pt
  confidence_threshold: 0.5
  iou_threshold: 0.45
  classes:  # Classes to detect
    - human
    - zombie

# Depth Estimation Settings
depth:
  model: depth_anything_v2
  encoder: vits  # vits, vitb, vitl
  device: auto  # auto, cuda, or cpu
  input_size: 518

# Laser Control Settings
laser:
  enabled: false
  auto_fire: false      # Keep false for servo aiming/calibration; true sends FIRE:ON
  port: /dev/ttyUSB0  # Serial port for laser control
  baud_rate: 9600
  target_class: zombie  # Only target zombies, exclude humans
  min_distance: 0.05    # Minimum relative depth value (0..1)
  max_distance: 0.95    # Maximum relative depth value (0..1)

# Video Input Settings
video:
  source: 0  # 0 for webcam, or path to video file
  fps: 30
  width: 640
  height: 480
  flip_horizontal: false

# Output Settings
output:
  save_results: true
  results_dir: results/
  save_video: false
  draw_bbox: true
  draw_depth: true
