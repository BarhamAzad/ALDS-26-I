# ALDS Pan/Tilt Targeting System Configuration

# YOLO26 Detection Settings
detection:
  model: runs/detect/runs/detect/yolo26s_human_zombie_finetune_afterlife/weights/best.pt
  confidence_threshold: 0.5
  iou_threshold: 0.45
  classes:  # Classes to detect
    - human
    - zombie

# Depth Estimation Settings
depth:
  enabled: true
  model: depth_anything_v2
  encoder: vits  # vits, vitb, vitl
  device: auto  # auto, cuda, or cpu
  input_size: 256
  update_interval: 8  # Estimate depth every N frames for faster live preview

# Pan/Tilt Control Settings
pan_tilt:
  enabled: true
  port: /dev/cu.usbserial-10  # Serial port for Arduino Mega pan/tilt control
  baud_rate: 9600
  target_class: any     # Track the nearest detected human or zombie
  fallback_to_any_detection: false
  min_distance: 0.05    # Minimum relative depth value (0..1)
  max_distance: 0.95    # Maximum relative depth value (0..1)
  pan_start: 180
  tilt_start: 90
  pan_min: 90
  pan_max: 270
  tilt_min: 80
  tilt_max: 150
  pan_gain: 2.0         # Lower value = slower correction toward the target
  tilt_gain: 2.0        # Lower value = slower correction toward the target
  deadband_px: 30       # Do not move when target is close enough to center
  command_interval: 0.20
  invert_pan: true      # Pan range is reversed: 270=min horizontal, 180=center, 90=max
  invert_tilt: false    # Flip if the tilt axis moves away from the target

# Video Input Settings
video:
  source: 0  # 0 for webcam, or path to video file
  fps: 30
  width: 1200
  height: 800
  flip_horizontal: false

# Output Settings
output:
  save_results: true
  results_dir: results/
  save_video: false
  draw_bbox: true
  draw_depth: true
